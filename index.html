<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lyria Radio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              mono: ['"Share Tech Mono"', 'monospace'],
              digital: ['"Orbitron"', 'sans-serif'],
            },
            colors: {
              radio: {
                case: '#1a1a1a',     // Dark plastic
                face: '#0a0a0a',     // Display background
                dim: '#2a2a2a',      // Inactive segments
                lit: '#ff3333',      // Active Red LED
                glow: 'rgba(255, 51, 51, 0.6)', // Glow color
                accent: '#3b82f6',   // Blue accent for some indicators
                btn: '#262626',      // Button color
              },
            },
            backgroundImage: {
              'speaker-grille': 'radial-gradient(circle, #000 20%, transparent 25%)',
              'brushed-metal': 'linear-gradient(180deg, #333 0%, #222 50%, #1a1a1a 100%)',
            },
            boxShadow: {
              'led': '0 0 10px rgba(255, 51, 51, 0.5), 0 0 20px rgba(255, 51, 51, 0.3)',
              'device': '0 20px 50px -10px rgba(0,0,0,0.8), inset 0 1px 1px rgba(255,255,255,0.1)',
              'btn': '0 4px 0 #000, 0 5px 10px rgba(0,0,0,0.5)',
              'btn-pressed': '0 1px 0 #000, inset 0 2px 5px rgba(0,0,0,0.5)',
              'inset-screen': 'inset 0 2px 10px rgba(0,0,0,0.8)',
            }
          },
        },
      };
    </script>
    <style>
      body {
        background-color: #121212;
        color: #e5e5e5;
        background-image: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #000 100%);
      }
      /* Hide default time picker icon */
      input[type="time"]::-webkit-calendar-picker-indicator {
        display: none;
      }
      input[type="time"] {
        -webkit-appearance: none;
        -moz-appearance: none;
        appearance: none;
      }
      .led-text-shadow {
        text-shadow: 0 0 10px rgba(255, 51, 51, 0.7);
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.37.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
